name: Daily Event Scrape (Botasaurus + Claude AI)

# Runs every morning at 7am UTC (8am BST) to catch overnight additions
# Also runnable manually from the GitHub Actions tab for testing
on:
  schedule:
    - cron: '0 7 * * *'
  workflow_dispatch:

permissions:
  contents: write   # needed to commit exports/events.json back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip

      - name: Install Python dependencies
        run: pip install -r automation/botasaurus_scraper/requirements.txt

      - name: Run scraper
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python automation/botasaurus_scraper/main.py

      # Only commit if we got a meaningful number of events.
      # If all sources fail, keep the previous exports/events.json intact.
      - name: Commit fresh events.json (if sufficient events found)
        run: |
          COUNT=$(python -c "
          import json, sys
          try:
              d = json.load(open('exports/events.json'))
              print(d.get('count', 0))
          except Exception:
              print(0)
          " 2>/dev/null || echo "0")

          echo "Events found: $COUNT"

          if [ "$COUNT" -gt "5" ]; then
            git config user.name  "Norwich Events Bot"
            git config user.email "bot@norwicheventshub.com"
            git add exports/events.json
            git diff --staged --quiet \
              || git commit -m "chore: daily event refresh $(date -u +'%Y-%m-%d %H:%M UTC') — ${COUNT} events"
            git push
            echo "✓ Committed and pushed $COUNT events"
          else
            echo "⚠ Only $COUNT events found — keeping previous exports/events.json"
          fi
